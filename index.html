<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fit">
  <title>Fit</title>
  <style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    #header {
      display: flex;
      gap: 1.5rem;
      font-size: 1rem;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #phase {
      font-size: 1.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: color 0.4s;
    }

    body[data-phase="work"] #phase { color: #ff6040; }
    body[data-phase="rest"] #phase { color: #4098e0; }
    body[data-phase="done"] #phase { color: #40c060; }

    #timer {
      font-size: min(22vw, 28vh);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #buttons {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    button {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    .pill-btn {
      border: 2px solid #fff;
      border-radius: 2rem;
      letter-spacing: 0.12em;
    }

    .pill-btn:active {
      background: #fff;
      color: #000;
    }

    .ghost-btn { opacity: 0.3; }

    .ghost-btn:active { opacity: 0.7; }

    #startPauseBtn {
      font-size: 1.1rem;
      padding: 0.9rem 3rem;
    }

    #resetBtn {
      font-size: 0.9rem;
      padding: 0.5rem;
      letter-spacing: 0.12em;
    }

    #settingsBtn, #closeSettingsBtn {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      width: 44px;
      height: 44px;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* settings dialog */

    dialog[open] {
      background: #000;
      border: none;
      color: #fff;
      padding: 2rem 1.75rem;
      width: 100%;
      height: 100dvh;
      max-width: 100%;
      max-height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    dialog::backdrop { display: none; }

    #settingsForm { display: contents; }

    #presets, #fields, #doneBtn {
      width: min(100%, 300px);
    }

    #presets {
      display: flex;
      gap: 0.5rem;
    }

    .presetBtn {
      flex: 1;
      font-size: 0.85rem;
      padding: 0.55rem 0.25rem;
      border: 1px solid #444;
      border-radius: 0.75rem;
    }

    .presetBtn:active { background: #333; }

    #fields {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 0.85rem 0.75rem;
    }

    #fields label {
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.85rem;
    }

    #fields input {
      background: #222;
      border: 1px solid #444;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
      padding: 0.4rem 0.6rem;
      text-align: right;
      width: 5rem;
    }

    #fields .hint {
      font-size: 0.75rem;
      opacity: 0.35;
    }

    #doneBtn {
      font-size: 1rem;
      padding: 0.75rem 2rem;
      align-self: center;
    }

    /* progress bar */

    #progressBar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
    }

    #progressFill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      clip-path: inset(0 100% 0 0);
    }
  </style>
</head>
<body data-phase="work">
  <div id="header">
    <span id="round">Round 1</span>
    <span id="totalTime">0:00</span>
  </div>
  <div id="phase">Work</div>
  <div id="timer">0:00</div>
  <button id="settingsBtn" class="ghost-btn">⚙</button>
  <div id="buttons">
    <button id="startPauseBtn" class="pill-btn">Start</button>
    <button id="resetBtn" class="ghost-btn">Reset</button>
  </div>

  <div id="progressBar"></div>

  <dialog id="settingsDialog">
    <button id="closeSettingsBtn" class="ghost-btn">✕</button>
    <div id="presets">
      <button class="presetBtn" data-preset="0">20/10 ×8</button>
      <button class="presetBtn" data-preset="1">30/15 ×10</button>
      <button class="presetBtn" data-preset="2">45/15 ×8</button>
    </div>
    <form id="settingsForm">
      <div id="fields">
        <label for="workInput">Work</label>
        <input type="number" id="workInput" min="5" max="300">
        <span class="hint">sec</span>
        <label for="restInput">Rest</label>
        <input type="number" id="restInput" min="5" max="300">
        <span class="hint">sec</span>
        <label for="roundsInput">Rounds</label>
        <input type="number" id="roundsInput" min="0" max="99">
        <span class="hint">0 = ∞</span>
      </div>
      <button id="doneBtn" class="pill-btn">Done</button>
    </form>
  </dialog>

  <script>
    function assert(cond, msg) {
      // catch bad state early — use liberally

      if (!cond) { console.error('assert:', msg); }
    }

    const DEV = location.search.includes('dev');

    if ('serviceWorker' in navigator && !DEV) {
      navigator.serviceWorker.register('./sw.js');
    }

    const PRESETS = [
      { workSeconds: 20, restSeconds: 10, targetRounds: 8  },
      { workSeconds: 30, restSeconds: 15, targetRounds: 10 },
      { workSeconds: 45, restSeconds: 15, targetRounds: 8  },
    ];
    const DEFAULT_SETTINGS = { ...PRESETS[1] };
    let settings = { ...DEFAULT_SETTINGS };

    function loadSettings() {
      // restore persisted settings from localstorage on startup

      const saved = localStorage.getItem('fitSettings');
      if (!saved) { return; }
      try {
        Object.assign(settings, JSON.parse(saved));
      } catch (e) {}
    }

    function saveSettings() {
      // persist current settings to localstorage

      localStorage.setItem('fitSettings', JSON.stringify(settings));
    }

    function phaseDurations() {
      // return work/rest durations in seconds, shortened in dev mode

      return DEV ? { work: 8, rest: 5 } : { work: settings.workSeconds, rest: settings.restSeconds };
    }

    let running        = false;
    let phase          = 'work'; // 'work' | 'rest' | 'done'
    let elapsedMs      = 0;      // milliseconds within current phase
    let round          = 1;
    let totalMs        = 0;      // milliseconds since workout start
    let rafId          = null;   // requestanimationframe handle
    let lastTimestamp  = null;   // set to null when paused, used to compute delta
    let lastBeepSecond = -1;     // guards against firing beeps multiple times per second
    let audioCtx       = null;   // created on first tap (ios requirement)
    let wakeLock       = null;   // screen wake lock, acquired while running

    const SOUNDS = {
      countdownTickWork: [
        { frequency: 880, duration: 0.08, delay: 0 },
      ],
      countdownTickRest: [
        { frequency: 440, duration: 0.08, delay: 0 },
      ],
      transitionToRest: [
        { frequency: 660, duration: 0.2,  delay: 0   },
        { frequency: 440, duration: 0.4,  delay: 0.2 },
      ],
      transitionToWork: [
        { frequency: 880, duration: 0.1, delay: 0    },
        { frequency: 880, duration: 0.1, delay: 0.13 },
        { frequency: 880, duration: 0.1, delay: 0.26 },
      ],
      workPulse: [
        { frequency: 220, duration: 0.12, delay: 0 },
      ],
      workoutComplete: [
        { frequency: 440, duration: 0.15, delay: 0   },
        { frequency: 554, duration: 0.15, delay: 0.2 },
        { frequency: 660, duration: 0.4,  delay: 0.4 },
      ],
    };

    function playTone({ frequency, duration, delay }) {
      // schedule a single oscillator tone through the web audio api

      assert(audioCtx, 'playTone called before audioCtx exists');
      const oscillator = audioCtx.createOscillator();
      const gain       = audioCtx.createGain();
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.type            = 'sine';
      oscillator.frequency.value = frequency;
      const startTime = audioCtx.currentTime + (delay || 0);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.4, startTime + 0.01);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.01);
    }

    function playSound(tones) {
      // play a sequence of tones that make up a sound cue

      for (const tone of tones) {
        playTone(tone);
      }
    }

    function formatTimer(seconds) {
      // format a second count as m:ss for display

      const minutes   = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return `${minutes}:${String(remainder).padStart(2, '0')}`;
    }

    function buildProgressSegments() {
      // rebuild the progress bar background gradient and fill to match current settings

      const progressBar = document.getElementById('progressBar');
      if (settings.targetRounds === 0) {
        progressBar.style.display = 'none';
        return;
      }
      progressBar.style.display = '';

      const phases = phaseDurations();
      const total  = settings.targetRounds * phases.work + (settings.targetRounds - 1) * phases.rest;
      const dimStops    = [];
      const brightStops = [];
      let accumulated   = 0;

      for (let i = 0; i < settings.targetRounds; i++) {
        const workStart = (accumulated / total * 100).toFixed(4);
        accumulated += phases.work;
        const workEnd = (accumulated / total * 100).toFixed(4);
        dimStops.push(`rgba(255,96,64,0.2) ${workStart}%`, `rgba(255,96,64,0.2) ${workEnd}%`);
        brightStops.push(`#ff6040 ${workStart}%`, `#ff6040 ${workEnd}%`);

        if (i < settings.targetRounds - 1) {
          const restStart = (accumulated / total * 100).toFixed(4);
          accumulated += phases.rest;
          const restEnd = (accumulated / total * 100).toFixed(4);
          dimStops.push(`rgba(64,152,224,0.2) ${restStart}%`, `rgba(64,152,224,0.2) ${restEnd}%`);
          brightStops.push(`#4098e0 ${restStart}%`, `#4098e0 ${restEnd}%`);
        }
      }

      progressBar.style.background = `linear-gradient(to right, ${dimStops.join(', ')})`;

      const fill = document.createElement('div');
      fill.id = 'progressFill';
      fill.style.background = `linear-gradient(to right, ${brightStops.join(', ')})`;
      progressBar.replaceChildren(fill);
    }

    function updateProgressBar() {
      // advance the fill position to reflect total elapsed workout time

      if (settings.targetRounds === 0) { return; }
      const phases = phaseDurations();
      const totalDurationMs = (settings.targetRounds * phases.work + (settings.targetRounds - 1) * phases.rest) * 1000;
      const percentage = Math.min(totalMs / totalDurationMs * 100, 100);
      const fill = document.getElementById('progressFill');
      if (fill) { fill.style.clipPath = `inset(0 ${(100 - percentage).toFixed(2)}% 0 0)`; }
    }

    function render() {
      // update all dom elements to reflect current state

      const phases = phaseDurations();
      const timeRemaining = phase === 'done' ? 0 : phases[phase] - Math.floor(elapsedMs / 1000);
      document.body.dataset.phase = phase;
      const roundSuffix = settings.targetRounds > 0 ? ` / ${settings.targetRounds}` : '';
      document.getElementById('round').textContent         = `Round ${round}${roundSuffix}`;
      document.getElementById('totalTime').textContent     = formatTimer(Math.floor(totalMs / 1000));
      document.getElementById('phase').textContent         = phase === 'work' ? 'Work' : phase === 'rest' ? 'Rest' : 'Done';
      document.getElementById('timer').textContent         = formatTimer(timeRemaining);
      document.getElementById('startPauseBtn').textContent = running ? 'Pause' : 'Start';
      document.getElementById('settingsBtn').style.display = running ? 'none' : '';
    }

    function frame(timestamp) {
      // requestanimationframe callback — drives the timer and progress bar each frame

      rafId = requestAnimationFrame(frame);
      if (running) {
        const delta = lastTimestamp === null ? 0 : timestamp - lastTimestamp;
        elapsedMs += delta;
        totalMs   += delta;
        updateProgressBar(); // every frame for smooth animation
        advance();           // only updates dom text when the displayed second changes
      }
      lastTimestamp = running ? timestamp : null;
    }

    // --- level 2: state mutators ---
    // these transition state in a consistent way and do not call render

    function start() {
      // set running state and acquire wake lock — only plays the phase cue at elapsedMs === 0 (not on resume)

      running = true;
      if (elapsedMs === 0) {
        playSound(phase === 'work' ? SOUNDS.transitionToWork : SOUNDS.transitionToRest);
      }
      if (rafId === null) { rafId = requestAnimationFrame(frame); }
      if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').then(lock => { wakeLock = lock; });
      }
    }

    function pause() {
      // clear running state and release wake lock

      running = false;
      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
    }

    function finish() {
      // end the workout — stop the raf loop, set done state, play completion sound
      // called from advance() because workout completion is time-driven, not user-driven

      cancelAnimationFrame(rafId);
      rafId     = null;
      running   = false;
      phase     = 'done';
      elapsedMs = 0;
      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
      playSound(SOUNDS.workoutComplete);
    }

    function resetWorkout() {
      // reset all workout variables to start of round 1 — does not touch settings

      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
      if (rafId !== null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      running        = false;
      phase          = 'work';
      elapsedMs      = 0;
      totalMs        = 0;
      round          = 1;
      lastTimestamp  = null;
      lastBeepSecond = -1;
    }

    function advance() {
      // handle phase transitions and audio cues — called each second via the raf loop

      const phases     = phaseDurations();
      const phaseDurMs = phases[phase] * 1000;

      if (elapsedMs < phaseDurMs) {
        // raf fires ~60fps, so gate all side effects on integer second changes
        const elapsedSeconds = Math.floor(elapsedMs / 1000);
        if (elapsedSeconds === lastBeepSecond) { return; } // same second, nothing to do
        lastBeepSecond = elapsedSeconds;

        const timeRemaining = phases[phase] - elapsedSeconds;
        if (timeRemaining <= 3) {
          playSound(phase === 'work' ? SOUNDS.countdownTickWork : SOUNDS.countdownTickRest);
        } else if (phase === 'work' && elapsedSeconds > 0 && elapsedSeconds % 5 === 0) {
          playSound(SOUNDS.workPulse);
        }
        render();
        return;
      }

      elapsedMs -= phaseDurMs; // carry over overshoot to keep timing accurate
      lastBeepSecond = -1;
      if (phase === 'work') {
        if (settings.targetRounds > 0 && round >= settings.targetRounds) {
          // workout done — finish is called here because completion is time-driven, not from a user event
          finish();
          render();
          return;
        }
        phase = 'rest';
        playSound(SOUNDS.transitionToRest);
      } else {
        phase = 'work';
        round++;
        playSound(SOUNDS.transitionToWork);
      }
      render();
    }

    // --- level 3: event handlers ---
    // these compose state mutators to handle user actions — they should not call each other

    function onToggle() {
      // handle start/pause button — also unlocks audio context on ios

      if (!audioCtx) { audioCtx = new AudioContext(); }
      if (audioCtx.state === 'suspended') { audioCtx.resume(); }

      if (phase === 'done') { resetWorkout(); }

      if (running) {
        pause();
      } else {
        start();
      }
      render();
    }

    function onReset() {
      // handle reset button — restore workout to initial state

      resetWorkout();
      buildProgressSegments();
      render();
    }

    function onOpenSettings() {
      // populate inputs with current settings and show the settings dialog

      document.getElementById('workInput').value   = settings.workSeconds;
      document.getElementById('restInput').value   = settings.restSeconds;
      document.getElementById('roundsInput').value = settings.targetRounds;
      document.getElementById('settingsDialog').showModal();
    }

    function onApplySettings() {
      // read form inputs, clamp values, save, and reset the timer

      const workValue   = parseInt(document.getElementById('workInput').value, 10);
      const restValue   = parseInt(document.getElementById('restInput').value, 10);
      const roundsValue = parseInt(document.getElementById('roundsInput').value, 10);
      settings.workSeconds  = Math.max(5, isNaN(workValue)   ? DEFAULT_SETTINGS.workSeconds  : workValue);
      settings.restSeconds  = Math.max(5, isNaN(restValue)   ? DEFAULT_SETTINGS.restSeconds  : restValue);
      settings.targetRounds = Math.max(0, isNaN(roundsValue) ? DEFAULT_SETTINGS.targetRounds : roundsValue);
      saveSettings();
      resetWorkout();
      buildProgressSegments();
      render();
    }

    document.querySelectorAll('.presetBtn').forEach(button => {
      button.addEventListener('click', () => {
        const preset = PRESETS[button.dataset.preset];
        document.getElementById('workInput').value   = preset.workSeconds;
        document.getElementById('restInput').value   = preset.restSeconds;
        document.getElementById('roundsInput').value = preset.targetRounds;
      });
    });

    document.querySelectorAll('#fields input').forEach(input => {
      input.addEventListener('focus', () => input.select());
    });

    document.getElementById('settingsForm').addEventListener('submit', (e) => {
      e.preventDefault();
      onApplySettings();
      document.getElementById('settingsDialog').close();
    });

    document.getElementById('closeSettingsBtn').addEventListener('click', () => {
      document.getElementById('settingsDialog').close();
    });

    document.getElementById('settingsBtn').addEventListener('click', onOpenSettings);
    document.getElementById('startPauseBtn').addEventListener('click', onToggle);
    document.getElementById('resetBtn').addEventListener('click', onReset);

    // re-acquire wake lock if page becomes visible again while running
    document.addEventListener('visibilitychange', () => {
      if (running && document.visibilityState === 'visible' && 'wakeLock' in navigator) {
        navigator.wakeLock.request('screen').then(lock => { wakeLock = lock; });
      }
    });

    loadSettings();
    buildProgressSegments();
    render();
  </script>
</body>
</html>
