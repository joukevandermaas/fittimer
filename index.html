<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fit">
  <title>Fit</title>
  <style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(0.25rem, 2dvh, 1rem);
    }

    #header {
      display: flex;
      gap: 1.5rem;
      font-size: 1rem;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #phase {
      font-size: 1.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: color 0.4s;
    }

    body[data-phase="work"] #phase { color: #ff6040; }
    body[data-phase="rest"] #phase { color: #4098e0; }
    body[data-phase="done"] #phase { color: #40c060; }

    #timer {
      font-size: min(22vw, 28vh);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #buttons {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    button {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    .pill-btn {
      border: 2px solid #fff;
      border-radius: 2rem;
      letter-spacing: 0.12em;
    }

    .pill-btn:active {
      background: #fff;
      color: #000;
    }

    .ghost-btn { opacity: 0.3; }

    .ghost-btn:active { opacity: 0.7; }

    #startPauseBtn {
      font-size: 1.1rem;
      padding: 0.9rem 3rem;
    }

    #resetBtn {
      font-size: 0.9rem;
      padding: 0.5rem;
      letter-spacing: 0.12em;
    }

    #settingsBtn, #closeSettingsBtn {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      width: 44px;
      height: 44px;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* settings dialog */

    dialog[open] {
      background: #000;
      border: none;
      color: #fff;
      padding: 2rem 1.75rem;
      width: 100%;
      height: 100dvh;
      max-width: 100%;
      max-height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    dialog::backdrop { display: none; }

    #settingsForm { display: contents; }

    #presets, #fields, #doneBtn {
      width: min(100%, 300px);
    }

    #presets {
      display: flex;
      gap: 0.5rem;
    }

    .presetBtn {
      flex: 1;
      font-size: 0.85rem;
      padding: 0.55rem 0.25rem;
      border: 1px solid #444;
      border-radius: 0.75rem;
    }

    .presetBtn:active { background: #333; }

    #fields {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 0.85rem 0.75rem;
    }

    #fields label {
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.85rem;
    }

    #fields input {
      background: #222;
      border: 1px solid #444;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
      padding: 0.4rem 0.6rem;
      text-align: right;
      width: 5rem;
    }

    #fields .hint {
      font-size: 0.75rem;
      opacity: 0.35;
    }

    #doneBtn {
      font-size: 1rem;
      padding: 0.75rem 2rem;
      align-self: center;
    }

    /* progress bar */

    #progressBar {
      position: fixed;
      bottom: max(8px, env(safe-area-inset-bottom));
      left: max(8px, env(safe-area-inset-bottom));
      right: max(8px, env(safe-area-inset-bottom));
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
    }

    #progressFill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      clip-path: inset(0 100% 0 0);
    }
  </style>
</head>
<body data-phase="work">
  <div id="header">
    <span id="round">Round 1</span>
    <span id="totalTime">0:00</span>
  </div>
  <div id="phase">Work</div>
  <div id="timer">0:00</div>
  <button id="settingsBtn" class="ghost-btn">⚙</button>
  <div id="buttons">
    <button id="startPauseBtn" class="pill-btn">Start</button>
    <button id="resetBtn" class="ghost-btn">Reset</button>
  </div>

  <div id="progressBar"></div>

  <dialog id="settingsDialog">
    <button id="closeSettingsBtn" class="ghost-btn">✕</button>
    <div id="presets">
      <button class="presetBtn" data-preset="0">20/10 ×8</button>
      <button class="presetBtn" data-preset="1">30/15 ×10</button>
      <button class="presetBtn" data-preset="2">45/15 ×8</button>
    </div>
    <form id="settingsForm">
      <div id="fields">
        <label for="workInput">Work</label>
        <input type="number" id="workInput" min="5" max="300">
        <span class="hint">sec</span>
        <label for="restInput">Rest</label>
        <input type="number" id="restInput" min="5" max="300">
        <span class="hint">sec</span>
        <label for="roundsInput">Rounds</label>
        <input type="number" id="roundsInput" min="0" max="99">
        <span class="hint">0 = ∞</span>
      </div>
      <button id="doneBtn" class="pill-btn">Done</button>
    </form>
  </dialog>

  <script>
    function assert(cond, msg) {
      // catch bad state early — use liberally

      if (!cond) { console.error('assert:', msg); }
    }

    const DEV = location.search.includes('dev');

    if ('serviceWorker' in navigator && !DEV) {
      navigator.serviceWorker.register('./sw.js');
    }

    const PRESETS = [
      { workSeconds: 20, restSeconds: 10, targetRounds: 8  },
      { workSeconds: 30, restSeconds: 15, targetRounds: 10 },
      { workSeconds: 45, restSeconds: 15, targetRounds: 8  },
    ];
    const DEFAULT_SETTINGS = { ...PRESETS[1] };
    let settings = { ...DEFAULT_SETTINGS };

    function loadSettings() {
      // restore persisted settings from localstorage on startup

      const saved = localStorage.getItem('fitSettings');
      if (!saved) { return; }
      try {
        Object.assign(settings, JSON.parse(saved));
      } catch (e) {}
    }

    function saveSettings() {
      // persist current settings to localstorage

      localStorage.setItem('fitSettings', JSON.stringify(settings));
    }

    function phaseDurations() {
      // return work/rest durations in seconds, shortened in dev mode

      return DEV ? { work: 8, rest: 5 } : { work: settings.workSeconds, rest: settings.restSeconds };
    }

    let timerState          = 'idle'; // 'idle' | 'countdown' | 'active' | 'paused' | 'done'
    let phase               = 'work'; // 'work' | 'rest'
    let countdownMs         = 0;      // elapsed ms in the current countdown
    let phaseElapsedMs      = 0;      // elapsed ms in the current workout phase
    let workoutMs           = 0;      // total elapsed ms across all workout phases
    let round               = 1;
    let lastCountdownSecond = -1;     // guards countdown beeps against firing multiple times
    // there are two distinct "get ready" countdowns, both showing 3-2-1 with the same visuals and sounds:
    //
    // start countdown (timerState === 'countdown'):
    //   triggered when the user presses start from idle, or resumes after pausing during work.
    //   the workout clock does NOT tick. pausing resets it to 0 on next start. countdownMs tracks it.
    //
    // work countdown (workCountdown === true):
    //   the final 3 seconds of the rest phase. fully inside the event loop — the workout clock ticks,
    //   pausing freezes it in place, and it resumes exactly where it left off. driven by the event queue.
    let workCountdown       = false;  // set by the event queue during rest's final 3 seconds
    let events              = [];     // scheduled phase events: [{ atMs, fn }], sorted ascending
    let rafId               = null;
    let lastTimestamp       = null;
    let audioCtx            = null;
    let wakeLock            = null;

    const SOUNDS = {
      countdownTickWork: [
        { frequency: 880, duration: 0.08, delay: 0 },
      ],
      countdownTickRest: [
        { frequency: 440, duration: 0.08, delay: 0 },
      ],
      transitionToRest: [
        { frequency: 660, duration: 0.2,  delay: 0   },
        { frequency: 440, duration: 0.4,  delay: 0.2 },
      ],
      transitionToWork: [
        { frequency: 880, duration: 0.1, delay: 0    },
        { frequency: 880, duration: 0.1, delay: 0.13 },
        { frequency: 880, duration: 0.1, delay: 0.26 },
      ],
      workPulse: [
        { frequency: 220, duration: 0.12, delay: 0 },
      ],
      workoutComplete: [
        { frequency: 440, duration: 0.15, delay: 0   },
        { frequency: 554, duration: 0.15, delay: 0.2 },
        { frequency: 660, duration: 0.4,  delay: 0.4 },
      ],
    };

    function playTone({ frequency, duration, delay }) {
      // schedule a single oscillator tone through the web audio api

      assert(audioCtx, 'playTone called before audioCtx exists');
      const oscillator = audioCtx.createOscillator();
      const gain       = audioCtx.createGain();
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.type            = 'sine';
      oscillator.frequency.value = frequency;
      const startTime = audioCtx.currentTime + (delay || 0);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.4, startTime + 0.01);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.01);
    }

    function playSound(tones) {
      // play a sequence of tones that make up a sound cue

      for (const tone of tones) {
        playTone(tone);
      }
    }

    function formatTimer(seconds) {
      // format a second count as m:ss for display

      const minutes   = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return `${minutes}:${String(remainder).padStart(2, '0')}`;
    }

    // --- event scheduler ---

    function schedule(atMs, fn) {
      // insert an event into the sorted phase event queue

      events.push({ atMs, fn });
      events.sort((a, b) => a.atMs - b.atMs);
    }

    function clearEvents() {
      // discard all pending scheduled events

      events = [];
    }

    function drainEvents() {
      // fire all events whose scheduled time has arrived

      while (events.length && events[0].atMs <= phaseElapsedMs) {
        events.shift().fn();
      }
    }

    function schedulePhaseEvents() {
      // precompute and enqueue all audio cues and the end-of-phase transition for the current phase
      // only schedules events that are still in the future, so it is safe to call when resuming mid-phase

      const phases     = phaseDurations();
      const durationMs = phases[phase] * 1000;
      const tickSound  = phase === 'rest' ? SOUNDS.countdownTickRest : SOUNDS.countdownTickWork;

      if (phase === 'work') {
        for (let t = 5000; t < durationMs - 3000; t += 5000) {
          if (t > phaseElapsedMs) { schedule(t, () => playSound(SOUNDS.workPulse)); }
        }
        for (let i = 3; i >= 1; i--) {
          const t = durationMs - i * 1000;
          if (t > phaseElapsedMs) { schedule(t, () => playSound(tickSound)); }
        }
        schedule(durationMs, endPhase);
      } else {
        const countdownStartMs = durationMs - 3000;
        if (countdownStartMs > phaseElapsedMs) {
          schedule(countdownStartMs, () => { workCountdown = true; });
        } else {
          workCountdown = true; // resumed mid-work-countdown
        }
        for (let i = 3; i >= 1; i--) {
          const t = durationMs - i * 1000;
          if (t > phaseElapsedMs) { schedule(t, () => playSound(tickSound)); }
        }
        schedule(durationMs, endPhase);
      }
    }

    // --- level 1: rendering ---

    function buildProgressSegments() {
      // rebuild the progress bar background gradient and fill to match current settings

      const progressBar = document.getElementById('progressBar');
      if (settings.targetRounds === 0) {
        progressBar.style.display = 'none';
        return;
      }
      progressBar.style.display = '';

      const phases = phaseDurations();
      const total  = settings.targetRounds * phases.work + (settings.targetRounds - 1) * phases.rest;
      const dimStops    = [];
      const brightStops = [];
      let accumulated   = 0;

      for (let i = 0; i < settings.targetRounds; i++) {
        const workStart = (accumulated / total * 100).toFixed(4);
        accumulated += phases.work;
        const workEnd = (accumulated / total * 100).toFixed(4);
        dimStops.push(`rgba(255,96,64,0.2) ${workStart}%`, `rgba(255,96,64,0.2) ${workEnd}%`);
        brightStops.push(`#ff6040 ${workStart}%`, `#ff6040 ${workEnd}%`);

        if (i < settings.targetRounds - 1) {
          const restStart = (accumulated / total * 100).toFixed(4);
          accumulated += phases.rest;
          const restEnd = (accumulated / total * 100).toFixed(4);
          dimStops.push(`rgba(64,152,224,0.2) ${restStart}%`, `rgba(64,152,224,0.2) ${restEnd}%`);
          brightStops.push(`#4098e0 ${restStart}%`, `#4098e0 ${restEnd}%`);
        }
      }

      progressBar.style.background = `linear-gradient(to right, ${dimStops.join(', ')})`;

      const fill = document.createElement('div');
      fill.id = 'progressFill';
      fill.style.background = `linear-gradient(to right, ${brightStops.join(', ')})`;
      progressBar.replaceChildren(fill);
    }

    function updateProgressBar() {
      // advance the fill position to reflect total elapsed workout time

      if (settings.targetRounds === 0) { return; }
      const phases = phaseDurations();
      const totalDurationMs = (settings.targetRounds * phases.work + (settings.targetRounds - 1) * phases.rest) * 1000;
      const percentage = Math.min(workoutMs / totalDurationMs * 100, 100);
      const fill = document.getElementById('progressFill');
      if (fill) { fill.style.clipPath = `inset(0 ${(100 - percentage).toFixed(2)}% 0 0)`; }
    }

    function render() {
      // update all dom elements to reflect current timer and workout state

      const phases    = phaseDurations();
      const isRunning = timerState === 'active' || timerState === 'countdown';

      let phaseLabel, timerText, dataPhase;
      if (timerState === 'countdown') {
        phaseLabel = 'Get Ready';
        timerText  = String(3 - Math.floor(countdownMs / 1000));
        dataPhase  = 'work';
      } else if (timerState === 'done') {
        phaseLabel = 'Done';
        timerText  = formatTimer(0);
        dataPhase  = 'done';
      } else if (workCountdown) {
        const timeRemaining = phases[phase] - Math.floor(phaseElapsedMs / 1000);
        phaseLabel = 'Get Ready';
        timerText  = String(timeRemaining);
        dataPhase  = 'rest';
      } else {
        const timeRemaining = phases[phase] - Math.floor(phaseElapsedMs / 1000);
        phaseLabel = phase === 'work' ? 'Work' : 'Rest';
        timerText  = formatTimer(Math.max(0, timeRemaining));
        dataPhase  = phase;
      }

      const roundSuffix = settings.targetRounds > 0 ? ` / ${settings.targetRounds}` : '';
      document.body.dataset.phase                          = dataPhase;
      document.getElementById('round').textContent         = `Round ${round}${roundSuffix}`;
      document.getElementById('totalTime').textContent     = formatTimer(Math.floor(workoutMs / 1000));
      document.getElementById('phase').textContent         = phaseLabel;
      document.getElementById('timer').textContent         = timerText;
      document.getElementById('startPauseBtn').textContent = isRunning ? 'Pause' : 'Start';
      document.getElementById('settingsBtn').style.display = isRunning ? 'none' : '';
    }

    function frame(timestamp) {
      // requestanimationframe callback — drives clocks, event queue, and progress bar each frame

      rafId = requestAnimationFrame(frame);
      const delta = lastTimestamp === null ? 0 : timestamp - lastTimestamp;
      lastTimestamp = timestamp;

      if (timerState === 'countdown') {
        countdownMs += delta;
        const remaining = 3 - Math.floor(countdownMs / 1000);
        if (remaining !== lastCountdownSecond) {
          lastCountdownSecond = remaining;
          if (remaining > 0) { playSound(SOUNDS.countdownTickRest); }
        }
        if (countdownMs >= 3000) {
          playSound(SOUNDS.transitionToWork);
          enterActive();
        }
      } else if (timerState === 'active') {
        phaseElapsedMs += delta;
        workoutMs      += delta;
        drainEvents();
        updateProgressBar();
      }

      render();
    }

    // --- level 2: state transitions ---

    function startRaf() {
      // begin the animation loop with a zeroed delta on the first frame

      if (rafId !== null) { return; }
      lastTimestamp = null;
      rafId = requestAnimationFrame(frame);
    }

    function stopRaf() {
      // cancel the animation loop and clear the timestamp

      if (rafId !== null) { cancelAnimationFrame(rafId); }
      rafId         = null;
      lastTimestamp = null;
    }

    function acquireWakeLock() {
      // request screen wake lock to keep the display on during the workout

      if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').then(lock => { wakeLock = lock; });
      }
    }

    function releaseWakeLock() {
      // release the screen wake lock if one is held

      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
    }

    function enterCountdown() {
      // begin a 3-second get-ready countdown before starting or resuming a work phase

      timerState          = 'countdown';
      countdownMs         = 0;
      lastCountdownSecond = -1;
      startRaf();
    }

    function enterActive() {
      // start or resume the current workout phase — callers are responsible for playing transition sounds

      timerState = 'active';
      clearEvents();
      schedulePhaseEvents();
      acquireWakeLock();
      startRaf();
    }

    function enterPaused() {
      // freeze the workout — events are discarded and rescheduled fresh on resume

      timerState = 'paused';
      clearEvents();
      stopRaf();
      releaseWakeLock();
    }

    function enterIdle() {
      // reset all workout state to the beginning

      stopRaf();
      releaseWakeLock();
      clearEvents();
      timerState     = 'idle';
      phase          = 'work';
      phaseElapsedMs = 0;
      workoutMs      = 0;
      round          = 1;
      workCountdown  = false;
    }

    function enterDone() {
      // end the workout and play the completion sound

      stopRaf();
      releaseWakeLock();
      clearEvents();
      timerState    = 'done';
      workCountdown = false;
      playSound(SOUNDS.workoutComplete);
    }

    function endPhase() {
      // transition to the next phase — called from the event queue when a phase timer expires

      workCountdown  = false;
      const phases   = phaseDurations();
      phaseElapsedMs -= phases[phase] * 1000; // carry over overshoot to keep timing accurate

      if (phase === 'work' && settings.targetRounds > 0 && round >= settings.targetRounds) {
        enterDone();
        return;
      }
      if (phase === 'work') {
        phase = 'rest';
        playSound(SOUNDS.transitionToRest);
      } else {
        phase = 'work';
        round++;
        playSound(SOUNDS.transitionToWork);
      }
      enterActive();
    }

    // --- level 3: event handlers ---
    // these compose state transitions to handle user actions — they should not call each other

    function onToggle() {
      // handle start/pause button — also creates and unlocks audio context on ios

      if (!audioCtx) { audioCtx = new AudioContext(); }
      if (audioCtx.state === 'suspended') { audioCtx.resume(); }

      if (timerState === 'done') { enterIdle(); }

      if (timerState === 'idle' || (timerState === 'paused' && phase === 'work')) {
        enterCountdown();
      } else if (timerState === 'paused' && phase === 'rest') {
        enterActive();
      } else if (timerState === 'active' || timerState === 'countdown') {
        enterPaused();
      }

      render();
    }

    function onReset() {
      // handle reset button — restore workout to initial state

      enterIdle();
      buildProgressSegments();
      render();
    }

    function onOpenSettings() {
      // populate inputs with current settings and show the settings dialog

      document.getElementById('workInput').value   = settings.workSeconds;
      document.getElementById('restInput').value   = settings.restSeconds;
      document.getElementById('roundsInput').value = settings.targetRounds;
      document.getElementById('settingsDialog').showModal();
    }

    function onApplySettings() {
      // read form inputs, clamp values, save, and reset the timer

      const workValue   = parseInt(document.getElementById('workInput').value, 10);
      const restValue   = parseInt(document.getElementById('restInput').value, 10);
      const roundsValue = parseInt(document.getElementById('roundsInput').value, 10);
      settings.workSeconds  = Math.max(5, isNaN(workValue)   ? DEFAULT_SETTINGS.workSeconds  : workValue);
      settings.restSeconds  = Math.max(5, isNaN(restValue)   ? DEFAULT_SETTINGS.restSeconds  : restValue);
      settings.targetRounds = Math.max(0, isNaN(roundsValue) ? DEFAULT_SETTINGS.targetRounds : roundsValue);
      saveSettings();
      enterIdle();
      buildProgressSegments();
      render();
    }

    document.querySelectorAll('.presetBtn').forEach(button => {
      button.addEventListener('click', () => {
        const preset = PRESETS[button.dataset.preset];
        document.getElementById('workInput').value   = preset.workSeconds;
        document.getElementById('restInput').value   = preset.restSeconds;
        document.getElementById('roundsInput').value = preset.targetRounds;
      });
    });

    document.querySelectorAll('#fields input').forEach(input => {
      input.addEventListener('focus', () => input.select());
    });

    document.getElementById('settingsForm').addEventListener('submit', (e) => {
      e.preventDefault();
      onApplySettings();
      document.getElementById('settingsDialog').close();
    });

    document.getElementById('closeSettingsBtn').addEventListener('click', () => {
      document.getElementById('settingsDialog').close();
    });

    document.getElementById('settingsBtn').addEventListener('click', onOpenSettings);
    document.getElementById('startPauseBtn').addEventListener('click', onToggle);
    document.getElementById('resetBtn').addEventListener('click', onReset);

    // re-acquire wake lock if page becomes visible again while active
    document.addEventListener('visibilitychange', () => {
      if (timerState === 'active' && document.visibilityState === 'visible') {
        acquireWakeLock();
      }
    });

    loadSettings();
    buildProgressSegments();
    render();
  </script>
</body>
</html>
