<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fit">
  <title>Fit</title>
  <style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    #header {
      display: flex;
      gap: 1.5rem;
      font-size: 1rem;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #phase {
      font-size: 1.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: color 0.4s;
    }

    body[data-phase="work"] #phase { color: #ff6040; }
    body[data-phase="rest"] #phase { color: #4098e0; }
    body[data-phase="done"] #phase { color: #40c060; }

    #timerBlock {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    #timer {
      font-size: min(22vw, 28vh);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #buttons {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    button {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      -webkit-tap-highlight-color: transparent;
    }

    #startPauseBtn {
      font-size: 1.1rem;
      padding: 0.9rem 3rem;
      border: 2px solid #fff;
      border-radius: 2rem;
    }

    #startPauseBtn:active {
      background: #fff;
      color: #000;
    }

    #resetBtn {
      font-size: 0.9rem;
      padding: 0.5rem;
      opacity: 0.3;
    }

    #resetBtn:active { opacity: 0.7; }

    #settingsBtn, #closeSettingsBtn {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      width: 44px;
      height: 44px;
      font-size: 1.25rem;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.3;
    }

    #settingsBtn:active, #closeSettingsBtn:active { opacity: 0.7; }

    /* settings dialog */

    dialog[open] {
      background: #000;
      border: none;
      color: #fff;
      padding: 2rem 1.75rem;
      width: 100%;
      height: 100dvh;
      max-width: 100%;
      max-height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    dialog::backdrop { display: none; }


    #settingsForm { display: contents; }

    #presets, #fields, #doneBtn {
      width: min(100%, 300px);
    }

    #presets {
      display: flex;
      gap: 0.5rem;
    }

    .presetBtn {
      flex: 1;
      font-size: 0.85rem;
      padding: 0.55rem 0.25rem;
      border: 1px solid #444;
      border-radius: 0.75rem;
      letter-spacing: 0;
      opacity: 1;
    }

    .presetBtn:active { background: #333; }

    #fields {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 0.85rem 0.75rem;
    }

    #fields label {
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.85rem;
    }

    #fields input {
      background: #222;
      border: 1px solid #444;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
      padding: 0.4rem 0.6rem;
      text-align: right;
      width: 5rem;
    }

    #fields .hint {
      font-size: 0.75rem;
      opacity: 0.35;
    }

    #doneBtn {
      font-size: 1rem;
      padding: 0.75rem 2rem;
      border: 2px solid #fff;
      border-radius: 2rem;
      align-self: center;
    }

    #doneBtn:active {
      background: #fff;
      color: #000;
    }

    /* progress bar */

    #progressBar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      display: grid;
    }

    .seg-work { background: rgba(255, 96, 64, 0.2); }
    .seg-rest { background: rgba(64, 152, 224, 0.2); }

    #progressFill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      clip-path: inset(0 100% 0 0);
    }
  </style>
</head>
<body data-phase="work">
  <div id="header">
    <span id="round">Round 1</span>
    <span id="totalTime">0:00</span>
  </div>
  <div id="phase">Work</div>
  <div id="timerBlock">
    <div id="timer">0:00</div>
  </div>
  <button id="settingsBtn">⚙</button>
  <div id="buttons">
    <button id="startPauseBtn">Start</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="progressBar"></div>

  <dialog id="settingsDialog">
    <button id="closeSettingsBtn">✕</button>
    <div id="presets">
      <button class="presetBtn" data-preset="0">20/10 ×8</button>
      <button class="presetBtn" data-preset="1">30/15 ×10</button>
      <button class="presetBtn" data-preset="2">45/15 ×8</button>
    </div>
    <form id="settingsForm">
      <div id="fields">
        <label for="workInput">Work</label>
        <input type="number" id="workInput" min="5" max="300">
        <span class="hint">sec</span>
        <label for="restInput">Rest</label>
        <input type="number" id="restInput" min="5" max="300">
        <span class="hint">sec</span>
        <label for="roundsInput">Rounds</label>
        <input type="number" id="roundsInput" min="0" max="99">
        <span class="hint">0 = ∞</span>
      </div>
      <button id="doneBtn">Done</button>
    </form>
  </dialog>

  <script>
    // assert helper — use liberally to catch bad state early
    function assert(cond, msg) { if (!cond) console.error('assert:', msg); }

    const DEV = location.search.includes('dev');

    if ('serviceWorker' in navigator && !DEV) {
      navigator.serviceWorker.register('./sw.js');
    }

    const PRESETS = [
      { workSeconds: 20, restSeconds: 10, targetRounds: 8  },
      { workSeconds: 30, restSeconds: 15, targetRounds: 10 },
      { workSeconds: 45, restSeconds: 15, targetRounds: 8  },
    ];
    const DEFAULT_SETTINGS = { ...PRESETS[1] };
    let settings = { ...DEFAULT_SETTINGS };

    function loadSettings() {
      const saved = localStorage.getItem('fitSettings');
      if (saved) {
        try { Object.assign(settings, JSON.parse(saved)); } catch (e) {}
      }
    }

    function saveSettings() {
      localStorage.setItem('fitSettings', JSON.stringify(settings));
    }

    // in dev mode, use short fixed durations regardless of settings
    function phaseDurations() {
      return DEV ? { work: 8, rest: 5 } : { work: settings.workSeconds, rest: settings.restSeconds };
    }

    let running        = false;
    let phase          = 'work'; // 'work' | 'rest' | 'done'
    let elapsedMs      = 0;      // milliseconds within current phase
    let round          = 1;
    let totalMs        = 0;      // milliseconds since workout start
    let rafId          = null;   // requestanimationframe handle
    let lastTimestamp  = null;   // set to null when paused, used to compute delta
    let lastBeepSecond = -1;     // guards against firing beeps multiple times per second
    let audioCtx       = null;   // created on first tap (ios requirement)
    let wakeLock       = null;   // screen wake lock, acquired while running

    const SOUNDS = {
      countdownTickWork: [
        { frequency: 880, duration: 0.08, delay: 0 },
      ],
      countdownTickRest: [
        { frequency: 440, duration: 0.08, delay: 0 },
      ],
      transitionToRest: [
        { frequency: 660, duration: 0.2,  delay: 0   },
        { frequency: 440, duration: 0.4,  delay: 0.2 },
      ],
      transitionToWork: [
        { frequency: 880, duration: 0.1, delay: 0    },
        { frequency: 880, duration: 0.1, delay: 0.13 },
        { frequency: 880, duration: 0.1, delay: 0.26 },
      ],
      workPulse: [
        { frequency: 220, duration: 0.12, delay: 0 },
      ],
      workoutComplete: [
        { frequency: 440, duration: 0.15, delay: 0   },
        { frequency: 554, duration: 0.15, delay: 0.2 },
        { frequency: 660, duration: 0.4,  delay: 0.4 },
      ],
    };

    function playTone({ frequency, duration, delay }) {
      assert(audioCtx, 'playTone called before audioCtx exists');
      const oscillator = audioCtx.createOscillator();
      const gain       = audioCtx.createGain();
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.type            = 'sine';
      oscillator.frequency.value = frequency;
      const startTime = audioCtx.currentTime + (delay || 0);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.4, startTime + 0.01);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.01);
    }

    function playSound(tones) {
      for (const tone of tones) {
        playTone(tone);
      }
    }

    function formatTimer(seconds) {
      const minutes = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return `${minutes}:${String(remainder).padStart(2, '0')}`;
    }

    function buildProgressSegments() {
      const progressBar = document.getElementById('progressBar');
      if (settings.targetRounds === 0) {
        progressBar.style.display = 'none';
        return;
      }
      progressBar.style.display = '';

      const phases = phaseDurations();
      const totalFractions = settings.targetRounds * phases.work + (settings.targetRounds - 1) * phases.rest;
      const columns = [];
      const children = [];
      const gradientStops = [];
      let accumulated = 0;

      for (let i = 0; i < settings.targetRounds; i++) {
        columns.push(`${phases.work}fr`);
        const workSeg = document.createElement('div');
        workSeg.className = 'seg-work';
        children.push(workSeg);

        const workStart = (accumulated / totalFractions * 100).toFixed(4);
        accumulated += phases.work;
        const workEnd = (accumulated / totalFractions * 100).toFixed(4);
        gradientStops.push(`#ff6040 ${workStart}%`, `#ff6040 ${workEnd}%`);

        if (i < settings.targetRounds - 1) {
          columns.push(`${phases.rest}fr`);
          const restSeg = document.createElement('div');
          restSeg.className = 'seg-rest';
          children.push(restSeg);

          const restStart = (accumulated / totalFractions * 100).toFixed(4);
          accumulated += phases.rest;
          const restEnd = (accumulated / totalFractions * 100).toFixed(4);
          gradientStops.push(`#4098e0 ${restStart}%`, `#4098e0 ${restEnd}%`);
        }
      }

      const fill = document.createElement('div');
      fill.id = 'progressFill';
      fill.style.background = `linear-gradient(to right, ${gradientStops.join(', ')})`;
      children.push(fill);

      progressBar.style.gridTemplateColumns = columns.join(' ');
      progressBar.replaceChildren(...children);
    }

    function updateProgressBar() {
      if (settings.targetRounds === 0) { return; }
      const phases = phaseDurations();
      const totalDurationMs = (settings.targetRounds * phases.work + (settings.targetRounds - 1) * phases.rest) * 1000;
      const pct = Math.min(totalMs / totalDurationMs * 100, 100);
      const fill = document.getElementById('progressFill');
      if (fill) { fill.style.clipPath = `inset(0 ${(100 - pct).toFixed(2)}% 0 0)`; }
    }

    function frame(timestamp) {
      rafId = requestAnimationFrame(frame);
      if (running) {
        const delta = lastTimestamp === null ? 0 : timestamp - lastTimestamp;
        elapsedMs += delta;
        totalMs   += delta;
        updateProgressBar(); // every frame for smooth animation
        tick();              // only updates dom text when the displayed second changes
      }
      lastTimestamp = running ? timestamp : null;
    }

    function render() {
      const phases = phaseDurations();
      const timeRemaining = phase === 'done' ? 0 : phases[phase] - Math.floor(elapsedMs / 1000);
      document.body.dataset.phase = phase;
      const roundSuffix = settings.targetRounds > 0 ? ` / ${settings.targetRounds}` : '';
      document.getElementById('round').textContent         = `Round ${round}${roundSuffix}`;
      document.getElementById('totalTime').textContent     = formatTimer(Math.floor(totalMs / 1000));
      document.getElementById('phase').textContent         = phase === 'work' ? 'Work' : phase === 'rest' ? 'Rest' : 'Done';
      document.getElementById('timer').textContent         = formatTimer(timeRemaining);
      document.getElementById('startPauseBtn').textContent = running ? 'Pause' : 'Start';
      document.getElementById('settingsBtn').style.display = running ? 'none' : '';
    }

    function tick() {
      const phases     = phaseDurations();
      const phaseDurMs = phases[phase] * 1000;

      if (elapsedMs >= phaseDurMs) {
        elapsedMs -= phaseDurMs; // carry over overshoot to keep timing accurate
        lastBeepSecond = -1;
        if (phase === 'work') {
          if (settings.targetRounds > 0 && round >= settings.targetRounds) {
            // last round complete — stop and show done state
            cancelAnimationFrame(rafId);
            rafId    = null;
            running  = false;
            phase    = 'done';
            elapsedMs = 0;
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
            playSound(SOUNDS.workoutComplete);
            render();
            return;
          }
          phase = 'rest';
          playSound(SOUNDS.transitionToRest);
        } else {
          phase = 'work';
          round++;
          playSound(SOUNDS.transitionToWork);
        }
        render();
        return;
      }

      // raf fires ~60fps, so gate all side effects on integer second changes
      const elapsedSeconds = Math.floor(elapsedMs / 1000);
      if (elapsedSeconds === lastBeepSecond) { return; } // same second, nothing to do
      lastBeepSecond = elapsedSeconds;

      const timeRemaining = phases[phase] - elapsedSeconds;
      if (timeRemaining <= 3) {
        playSound(phase === 'work' ? SOUNDS.countdownTickWork : SOUNDS.countdownTickRest);
      } else if (phase === 'work' && elapsedSeconds > 0 && elapsedSeconds % 5 === 0) {
        playSound(SOUNDS.workPulse);
      }
      render();
    }

    function toggle() {
      // create and resume audio context on first user gesture (ios requirement)
      if (!audioCtx) { audioCtx = new AudioContext(); }
      if (audioCtx.state === 'suspended') { audioCtx.resume(); }

      // if the previous workout completed, reset before starting a new one
      if (phase === 'done') { reset(); }

      running = !running;
      if (running) {
        playSound(phase === 'work' ? SOUNDS.transitionToWork : SOUNDS.transitionToRest);
        if (rafId === null) { rafId = requestAnimationFrame(frame); } // first start only
        // acquire wake lock to keep screen on during workout
        if ('wakeLock' in navigator) {
          navigator.wakeLock.request('screen').then(lock => { wakeLock = lock; });
        }
      } else {
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
      }
      render();
    }

    function reset() {
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
      running        = false;
      phase          = 'work';
      elapsedMs      = 0;
      totalMs        = 0;
      round          = 1;
      lastTimestamp  = null;
      lastBeepSecond = -1;
      buildProgressSegments();
      render();
    }

    function openSettings() {
      document.getElementById('workInput').value   = settings.workSeconds;
      document.getElementById('restInput').value   = settings.restSeconds;
      document.getElementById('roundsInput').value = settings.targetRounds;
      document.getElementById('settingsDialog').showModal();
    }

    function applySettings() {
      const workValue   = parseInt(document.getElementById('workInput').value, 10);
      const restValue   = parseInt(document.getElementById('restInput').value, 10);
      const roundsValue = parseInt(document.getElementById('roundsInput').value, 10);
      settings.workSeconds  = Math.max(5, isNaN(workValue)   ? DEFAULT_SETTINGS.workSeconds  : workValue);
      settings.restSeconds  = Math.max(5, isNaN(restValue)   ? DEFAULT_SETTINGS.restSeconds  : restValue);
      settings.targetRounds = Math.max(0, isNaN(roundsValue) ? DEFAULT_SETTINGS.targetRounds : roundsValue);
      saveSettings();
      reset();
    }

    document.querySelectorAll('.presetBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const preset = PRESETS[btn.dataset.preset];
        document.getElementById('workInput').value   = preset.workSeconds;
        document.getElementById('restInput').value   = preset.restSeconds;
        document.getElementById('roundsInput').value = preset.targetRounds;
      });
    });

    document.querySelectorAll('#fields input').forEach(input => {
      input.addEventListener('focus', () => input.select());
    });

    document.getElementById('settingsForm').addEventListener('submit', (e) => {
      e.preventDefault();
      applySettings();
      document.getElementById('settingsDialog').close();
    });

    document.getElementById('closeSettingsBtn').addEventListener('click', () => {
      document.getElementById('settingsDialog').close();
    });

    document.getElementById('settingsBtn').addEventListener('click', openSettings);
    document.getElementById('startPauseBtn').addEventListener('click', toggle);
    document.getElementById('resetBtn').addEventListener('click', reset);

    // re-acquire wake lock if page becomes visible again while running
    document.addEventListener('visibilitychange', () => {
      if (running && document.visibilityState === 'visible' && 'wakeLock' in navigator) {
        navigator.wakeLock.request('screen').then(lock => { wakeLock = lock; });
      }
    });

    loadSettings();
    buildProgressSegments();
    render();
  </script>
</body>
</html>
